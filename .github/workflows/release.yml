name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to test, build,
# attest, publish to PyPI, and cut a GitHub Release.
on:
  push:
    tags: ["v*"]

jobs:
  # Never publish a tag whose tests don't pass — the gate before the gate.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"   # pin for reproducible builds
      - name: Build sdist + wheel
        run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/proof-of-work
    permissions:
      id-token: write       # PyPI Trusted Publishing (OIDC) — no stored API token
      attestations: write   # SLSA build provenance
      contents: read
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      # On brand: a tamper-evidence tool signs its own release artifacts.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      # Attach the exact wheel + sdist so the release page is downloadable and
      # matches the PyPI artifacts (and their attestations).
      - name: Create GitHub Release with artifacts
        run: gh release create "${{ github.ref_name }}" --generate-notes dist/*
        env:
          GH_TOKEN: ${{ github.token }}
